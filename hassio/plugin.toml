id = "bkuri/hassio"
name = "Home Assistant"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "bkuri"
license = "MIT"
dependencies = []
tags = ["home-assistant", "iot", "utility"]
icon = "home"
description = "Monitor and control Home Assistant entities from the bar. Requires the ha-bridge companion script and python3-websockets."

# ── Plugin-level settings (shared across all entries) ──────────────────

[[setting]]
key = "haUrl"
type = "string"
label_key = "settings.haUrl.label"
description_key = "settings.haUrl.description"
default = ""

[[setting]]
key = "haToken"
type = "string"
label_key = "settings.haToken.label"
description_key = "settings.haToken.description"
default = ""

# ── Entries ─────────────────────────────────────────────────────────────

[[service]]
id = "ha"
entry = "service.luau"

[[widget]]
id = "status"
entry = "widget.luau"

[[shortcut]]
id = "toggle"
entry = "shortcut.luau"

[[panel]]
id = "entities"
entry = "panel.luau"
width = 400
height = 520
