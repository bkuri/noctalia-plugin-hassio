id = "bkuri/hassio"
name = "Home Assistant"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "bkuri"
license = "MIT"
dependencies = []
tags = ["home-assistant", "iot"]
icon = "home"
description = "Monitor and control Home Assistant entities from the bar."

[[setting]]
key = "haUrl"
type = "string"
default = ""

[[setting]]
key = "haToken"
type = "string"
default = ""

[[service]]
id = "ha"
entry = "service.luau"

[[widget]]
id = "status"
entry = "widget.luau"

[[shortcut]]
id = "toggle"
entry = "shortcut.luau"

[[panel]]
id = "entities"
entry = "panel.luau"
width = 400
height = 520
